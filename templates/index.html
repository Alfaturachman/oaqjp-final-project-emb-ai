<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Emotion Detector</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .card {
                background: white;
                border-radius: 16px;
                padding: 40px;
                width: 100%;
                max-width: 600px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            }
            h1 {
                color: #4a4a8a;
                margin-bottom: 8px;
                font-size: 1.8rem;
            }
            p.subtitle {
                color: #777;
                margin-bottom: 24px;
                font-size: 0.95rem;
            }
            textarea {
                width: 100%;
                height: 120px;
                border: 2px solid #e0e0e0;
                border-radius: 8px;
                padding: 12px;
                font-size: 1rem;
                resize: vertical;
                transition: border-color 0.2s;
            }
            textarea:focus {
                outline: none;
                border-color: #667eea;
            }
            button {
                margin-top: 16px;
                width: 100%;
                padding: 14px;
                background: linear-gradient(135deg, #667eea, #764ba2);
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: opacity 0.2s;
            }
            button:hover {
                opacity: 0.9;
            }
            #result {
                margin-top: 24px;
                padding: 16px;
                background: #f7f7ff;
                border-left: 4px solid #667eea;
                border-radius: 4px;
                color: #333;
                line-height: 1.6;
                display: none;
            }
            #result.error {
                border-left-color: #e53e3e;
                background: #fff5f5;
                color: #c53030;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>🧠 Emotion Detector</h1>
            <p class="subtitle">
                Powered by IBM Watson NLP · Analyze any text for emotional
                content
            </p>

            <textarea
                id="textInput"
                placeholder="Type or paste your text here..."
            ></textarea>
            <button onclick="analyzeEmotion()">Analyze Emotion</button>

            <div id="result"></div>
        </div>

        <script>
            async function analyzeEmotion() {
                const text = document.getElementById('textInput').value.trim();
                const resultDiv = document.getElementById('result');

                if (!text) {
                    resultDiv.className = 'error';
                    resultDiv.style.display = 'block';
                    resultDiv.textContent =
                        '⚠️  Please enter some text before analyzing.';
                    return;
                }

                resultDiv.style.display = 'block';
                resultDiv.className = '';
                resultDiv.textContent = 'Analyzing…';

                try {
                    const response = await fetch(
                        `/emotionDetector?textToAnalyze=${encodeURIComponent(text)}`,
                    );
                    const data = await response.text();

                    if (data.startsWith('Invalid')) {
                        resultDiv.className = 'error';
                        resultDiv.textContent = '⚠️  ' + data;
                    } else {
                        resultDiv.className = '';
                        resultDiv.textContent = data;
                    }
                } catch (err) {
                    resultDiv.className = 'error';
                    resultDiv.textContent =
                        'Error contacting the server. Please try again.';
                }
            }

            // Allow Enter key (Ctrl+Enter) to submit
            document
                .getElementById('textInput')
                .addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && e.ctrlKey) analyzeEmotion();
                });
        </script>
    </body>
</html>
